<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8" />
   <title>Say My Love To You</title>
   <link rel="Stylesheet" type="text/css" href="css/flower.css"/>
</head>
<body id="backgd">
   <audio id="bgMusic" loop>
    <source src="music/nhac.m4a" type="audio/mpeg">
   </audio>

   <div class="main-container">
      <button id="startBtn">Gửi Nhím của Bò <3</button>

      <div id="content-wrapper" style="display: none;">
         <canvas id="canvas" width="600" height="600"></canvas>
      </div>
   </div>

   <div id="image-container"></div>

   <script src="js/jquery.js" type="text/javascript"></script>
   <script src="js/flower.js" type="text/javascript"></script>
   <script>
      const urlParams = new URLSearchParams(window.location.search);
      var loveName = urlParams.get('n') || 'Nhím'; 

      document.getElementById('startBtn').addEventListener('click', function() {
         var music = document.getElementById('bgMusic');
         music.play().catch(e => console.log("Cần tương tác để phát nhạc")); 
         this.style.display = 'none'; 
         document.getElementById('content-wrapper').style.display = 'block';
         startAnimation(); 
         createFallingImages(); 
      });

      function createFallingImages() {
         const container = document.getElementById('image-container');
         const images = [
            'img/image1.jpg', 'img/image2.jpg', 'img/image3.jpg', 'img/image4.jpg',
            'img/image5.jpg', 'img/image6.jpg', 'img/image7.jpg', 'img/image8.jpg',
            'img/image9.jpg', 'img/image10.jpg', 'img/image11.jpg', 'img/image12.jpg'
         ]; 
         
         setInterval(() => {
            const img = document.createElement('img');
            img.src = images[Math.floor(Math.random() * images.length)];
            
            img.style.width = "200px";
            img.style.height = "200px";
            img.style.objectFit = "cover";
            img.style.borderRadius = "50%";
            img.style.position = "fixed";
            img.style.top = "-100px"; 
            img.style.zIndex = "1";
            img.style.border = "2px solid white";
            img.style.boxShadow = "0 4px 8px rgba(0,0,0,0.2)";
            
            img.style.left = Math.random() * 95 + "vw";
            
            const duration = Math.random() * 3 + 4 + "s";
            img.style.animation = `fallEffect ${duration} linear forwards`;
            
            container.appendChild(img);
            
            setTimeout(() => img.remove(), 7000);
         }, 800);
      }

      document.getElementById('startBtn').addEventListener('click', function() {
         var music = document.getElementById('bgMusic');
         
         music.currentTime = 0; 
         music.volume = 1.0;
         
         var playPromise = music.play();

         if (playPromise !== undefined) {
            playPromise.then(_ => {
                  console.log("Nhạc đang phát nè!");
            }).catch(error => {
                  console.log("Lỗi trình duyệt chặn nhạc: " + error);
                  setTimeout(() => { music.play(); }, 500);
            });
         }

         this.style.display = 'none'; 
         document.getElementById('content-wrapper').style.display = 'block';
         startAnimation(); 
         createFallingImages(); 
      });
   </script>
   <script src="js/bloom.js"></script>
</body>
</html>
